<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chord-e Core System v1.8</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="main-layout">
      <aside id="left-sidebar" class="sidebar"></aside>

      <div id="app">
        <header>
          <h1>Chord-e System v1.8</h1>
          <div id="bit-indicator">
            <div class="bit" id="bit-16">16<span>Thumb</span></div>
            <div class="bit" id="bit-8">8<span>Index</span></div>
            <div class="bit" id="bit-4">4<span>Middle</span></div>
            <div class="bit" id="bit-2">2<span>Ring</span></div>
            <div class="bit" id="bit-1">1<span>Pinky</span></div>
          </div>
        </header>

        <main>
          <div id="display-container">
            <div id="current-code">Binary: 00000</div>
            <div id="current-char">Ready</div>
          </div>
          <textarea
            id="output-log"
            readonly
            placeholder="Output here..."
          ></textarea>
          <div>
            <button id="btn-reset">clear</button>
          </div>
        </main>
      </div>

      <aside id="right-sidebar" class="sidebar"></aside>
    </div>
    <script src="chorde.js"></script>
    <script src="practice.js"></script>
  </body>
</html>
